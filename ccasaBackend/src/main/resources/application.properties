spring.application.name=ccasa

# Datasource (H2 para desarrollo; usar PostgreSQL en producción)
spring.datasource.url=jdbc:h2:mem:ccasa;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate (UTC para BD y serialización)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Jackson: fechas en UTC
spring.jackson.time-zone=UTC

# JWT RSA (claves en classpath: jwtKeys/*.pem)
app.jwt.expiration-ms=86400000
jwtKeys.privateKeyPath=classpath:jwtKeys/private_key.pem
jwtKeys.publicKeyPath=classpath:jwtKeys/public_key.pem
