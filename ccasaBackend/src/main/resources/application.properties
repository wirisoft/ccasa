spring.application.name=ccasa

# API stateless con JWT (JOSE/Nimbus): no persistir sesiones HTTP ni tareas SPRING_SESSION
spring.session.store-type=none

# Datasource (H2 para desarrollo; usar PostgreSQL en producción)
spring.datasource.url=jdbc:postgresql://localhost:5433/ccasa
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=qwerty
spring.h2.console.enabled=true

# JPA / Hibernate (UTC para BD y serialización)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Jackson: fechas en UTC
spring.jackson.time-zone=UTC

# JWT RSA (claves en classpath: jwtKeys/*.pem)
app.jwt.expiration-ms=86400000
jwtKeys.privateKeyPath=classpath:jwtKeys/private_key.pem
jwtKeys.publicKeyPath=classpath:jwtKeys/public_key.pem

server.port=8082
