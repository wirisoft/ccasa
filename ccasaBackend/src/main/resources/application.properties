spring.application.name=ccasa

# API stateless con JWT (JOSE/Nimbus): no persistir sesiones HTTP ni tareas SPRING_SESSION
spring.session.store-type=none

# IMPORTANTE: En producción definir DB_USERNAME y DB_PASSWORD como variables de entorno

# Datasource (H2 para desarrollo; usar PostgreSQL en producción)
spring.datasource.url=jdbc:postgresql://localhost:5433/ccasa
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:qwerty}
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# JPA / Hibernate (UTC para BD y serialización)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Jackson: fechas en UTC
spring.jackson.time-zone=UTC

# JWT RSA (claves en classpath: jwtKeys/*.pem)
app.jwt.expiration-ms=86400000
jwtKeys.privateKeyPath=classpath:jwtKeys/private_key.pem
jwtKeys.publicKeyPath=classpath:jwtKeys/public_key.pem

server.port=8082

# Catálogo de fórmulas Excel (lab_formula_cell): carga desde classpath:catalog/formula_cells.jsonl si la tabla está vacía
ccasa.formula-catalog.seed-enabled=true

# Almacenamiento de firmas de usuario (ruta relativa al directorio de trabajo del proceso o absoluta)
ccasa.uploads.signatures=./uploads/signatures
